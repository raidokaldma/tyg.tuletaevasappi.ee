      - name: Update 9B
        run: node tyhg-timetable-calendar-import/src/app.ts 9B > $GITHUB_WORKSPACE/public/9B
      - name: Update 9C
        run: node tyhg-timetable-calendar-import/src/app.ts 9C > $GITHUB_WORKSPACE/public/9C
      - name: Update 9D
        run: node tyhg-timetable-calendar-import/src/app.ts 9D > $GITHUB_WORKSPACE/public/9D
      - name: Update 10A
        run: node tyhg-timetable-calendar-import/src/app.ts 10A > $GITHUB_WORKSPACE/public/10A
      - name: Update 10B
        run: node tyhg-timetable-calendar-import/src/app.ts 10B > $GITHUB_WORKSPACE/public/10B
      - name: Update 10C
        run: node tyhg-timetable-calendar-import/src/app.ts 10C > $GITHUB_WORKSPACE/public/10C
      - name: Update 11A
        run: node tyhg-timetable-calendar-import/src/app.ts 11A > $GITHUB_WORKSPACE/public/11A

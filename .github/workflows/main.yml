        run: node tyhg-timetable-calendar-import/src/app.ts 11B > $GITHUB_WORKSPACE/public/11B
      - name: Update 11C
        run: node tyhg-timetable-calendar-import/src/app.ts 11C > $GITHUB_WORKSPACE/public/11C
      - name: Update 12
        run: node tyhg-timetable-calendar-import/src/app.ts 12 > $GITHUB_WORKSPACE/public/12
      - name: Git commit, push
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add public
          git commit -m "Automated update"
          git push origin main
